name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: BoschEbikeMonitorAndroidApp
        run: |
          ls -l gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: bosch-ebike-monitor-debug
          path: BoschEbikeMonitorAndroidApp/app/build/outputs/apk/debug/*.apk
